# Project-scope worktrunk hooks for my-setup.
#
# pre-start blocks `wt switch --create <name>` until complete. We
# install dev extras here so a fresh worktree arrives ready for
# `uv run pytest` / `uv run ruff check` / `uv run my-setup` without
# the implementer (or a subagent) having to remember `uv sync` as
# their first command.
[pre-start]
deps = "uv sync --extra dev"

# post-merge re-runs `uv sync --extra dev` after `wt merge`. Per
# `wt hook --help`, post-merge runs in the TARGET branch worktree
# (typically main) — not the merging worktree, which `wt merge`
# removes by default. So this catches the case where the just-merged
# branch added a dep (e.g. pexpect) and the
# main worktree's venv would otherwise lag. Unrelated sibling
# worktrees still need manual `uv sync` (Option (a) only).
[post-merge]
deps = "uv sync --extra dev"
