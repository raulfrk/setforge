# Test-only setforge config for E2E coverage.
#
# This config is tool-generic — it never references production profiles
# (vm-headless / -full / workstation), which will be extracted to a
# separate config repo. Every profile here exercises
# one well-defined mechanism so the matching variant in
# tests/test_e2e_docker.py and tests/test_cli_e2e.py can assert against
# a stable shape.
#
# Layout (tracked srcs):
#   tests/fixtures/e2e/tracked/<area>/<file>
# Live dst paths are intentionally placed under $HOME so docker
# variants and tmp-path CliRunner variants both work cleanly.
schema_version: '2.0'
version: 1

# ----------------------------------------------------------------------
# Tracked files. Each entry pairs a tracked src with a live dst plus optional
# preserve / template / section directives. Keys are stable identifiers
# referenced by profile.tracked_files lists below.
# ----------------------------------------------------------------------
tracked_files:
  # Plain text — floor case, no overlays, byte copy.
  minimal_text:
    src: minimal/text.txt
    dst: ~/.setforge_e2e/minimal/text.txt

  # Text tracked file with a tracked-authored HOST-LOCAL user-section marker.
  # Host-local-only sections take the markerless OVERLAY conversion path:
  # NO file-level disposition — the marker body is captured into a
  # local.yaml overlay span and the deployed file is rendered markerless.
  sections_md:
    src: sections/marked.md
    dst: ~/.setforge_e2e/sections/marked.md

  # Shared-semantics user-section markers — exercises the three-way
  # reconcile wizard.
  sections_shared_md:
    src: sections/shared.md
    dst: ~/.setforge_e2e/sections/shared.md
    disposition: shared

  # JSON tracked file — byte copy, no preserve mechanism.
  json_settings:
    src: json/settings.json
    dst: ~/.setforge_e2e/json/settings.json

  # Forked JSONC (host divergence kept on merge).
  # NOTE: extension is `.json` because setforge/jsonc.py:is_jsonc_file
  # treats every `.json` as JSONC-capable (matches VSCode semantics).
  jsonc_shallow:
    src: jsonc/shallow.json
    dst: ~/.setforge_e2e/jsonc/shallow.json
    disposition: forked

  # Forked JSONC — drives the disposition merge wizard variants.
  jsonc_deep:
    src: jsonc/deep.json
    dst: ~/.setforge_e2e/jsonc/deep.json
    disposition: forked

  # YAML shallow — proves yaml_merge.py shallow parity with jsonc.py.
  yaml_shallow:
    src: yaml/shallow.yaml
    dst: ~/.setforge_e2e/yaml/shallow.yaml
    disposition: forked

  # YAML deep — proves yaml_merge.py deep parity; drives YAML wizard variant.
  yaml_deep:
    src: yaml/deep.yaml
    dst: ~/.setforge_e2e/yaml/deep.yaml
    disposition: forked

  # Directory tree — recursive copy.
  directory_tree:
    src: directory
    dst: ~/.setforge_e2e/directory

  # Template — Jinja2 dst rendered (template: true triggers render).
  template_path:
    src: template/template.txt
    dst: "{{ vscode_user_dir }}/setforge-e2e-template.txt"
    template: true

  # Three-level chain tracked files (one per chain layer for distinguishable
  # parent-first-dedup ordering in test_install_chain_resolution).
  chain_grand:
    src: chain/grand.txt
    dst: ~/.setforge_e2e/chain/grand.txt
  chain_base:
    src: chain/base.txt
    dst: ~/.setforge_e2e/chain/base.txt
  chain_child:
    src: chain/child.txt
    dst: ~/.setforge_e2e/chain/child.txt

  # Comprehensive: plain + JSON + JSONC + YAML in one profile.
  comprehensive_text:
    src: comprehensive/notes.md
    dst: ~/.setforge_e2e/comprehensive/notes.md
  comprehensive_json:
    src: comprehensive/data.json
    dst: ~/.setforge_e2e/comprehensive/data.json
  comprehensive_jsonc:
    src: comprehensive/preserve-settings.json
    dst: ~/.setforge_e2e/comprehensive/preserve-settings.json
    disposition: forked
  comprehensive_yaml:
    src: comprehensive/config.yaml
    dst: ~/.setforge_e2e/comprehensive/config.yaml

  # Prose-reviewer agents + reviewing-markdown skill.
  # Test-only mirror of the production wiring in /workspace/setforge.yaml;
  # used by the prose-reviewer Docker e2e variants to exercise install /
  # compare / revert against new files that have no user-section markers
  # (implicitly covers hashed-marker's strict-tag parser).
  prose_python_agent:
    src: claude/agents/python-prose-reviewer.md
    dst: ~/.claude/agents/python-prose-reviewer.md
  prose_claude_md_agent:
    src: claude/agents/claude-md-prose-reviewer.md
    dst: ~/.claude/agents/claude-md-prose-reviewer.md
  prose_markdown_agent:
    src: claude/agents/markdown-prose-reviewer.md
    dst: ~/.claude/agents/markdown-prose-reviewer.md
  prose_reviewing_markdown_skill:
    src: claude/skills/reviewing-markdown/SKILL.md
    dst: ~/.claude/skills/reviewing-markdown/SKILL.md

  # workflows-category fixture (session-workflow): exercises install / compare /
  # revert of a ~/.claude/workflows/*.js file — a net-new deploy category whose
  # parent dir must be created on first deploy.
  workflows_example_impl:
    src: claude/workflows/example-impl.js
    dst: ~/.claude/workflows/example-impl.js

  # Host-local sections fixture. Plain markdown tracked
  # file with declared user-section markers AND with headings that anchor
  # injections from local.yaml's host_local_sections block.
  host_local_md:
    src: host-local/host.md
    dst: ~/.setforge_e2e/host-local/host.md
    disposition: shared
  host_local_md_symlink:
    src: host-local/host.md
    dst: ~/.setforge_e2e/host-local/host_link.md
    symlink: ~/.setforge_e2e/host-local/host_link_target.md
    disposition: shared
  # Non-markdown tracked_file used to test host-local's file-type rejection.
  host_local_json_reject:
    src: host-local/settings.json
    dst: ~/.setforge_e2e/host-local/settings.json

  # ---- Seed-once section-template fixture -----------------------------
  # A tracked markdown file declaring a host-local marker named after the
  # profile's section_slots key; first install seeds the empty slot from
  # the section_templates library body.
  section_seed_doc:
    src: section-templates/seed-doc.md
    dst: ~/.setforge_e2e/section-templates/seed-doc.md

  # ---- Disposition fixtures (shared / forked / pinned) -----------------
  # Each disposition gets its own dst (and thus file_id) so the per-host
  # stored base is independent across the three policies. The markdown src
  # routes through the line-based 3-way merge engine; the YAML src routes
  # through the comment-preserving structural engine.
  disposition_shared_md:
    src: disposition/note.md
    dst: ~/.setforge_e2e/disposition/shared.md
    disposition: shared
  disposition_forked_md:
    src: disposition/note.md
    dst: ~/.setforge_e2e/disposition/forked.md
    disposition: forked
  disposition_pinned_md:
    src: disposition/note.md
    dst: ~/.setforge_e2e/disposition/pinned.md
    disposition: pinned
  disposition_forked_yaml:
    src: disposition/config.yaml
    dst: ~/.setforge_e2e/disposition/forked.yaml
    disposition: forked

  # ---- override CLI fixtures --------------------------------------------
  # Clean shared md + yaml tracked_files with NO pre-declared spans so the
  # ``override pin`` user-journey adds a fresh host-local (or --shared) span
  # at runtime, then install / compare exercise the new override end-to-end.
  override_md:
    src: disposition/note.md
    dst: ~/.setforge_e2e/override/note.md
    disposition: shared
  override_yaml:
    src: disposition/config.yaml
    dst: ~/.setforge_e2e/override/config.yaml
    disposition: shared

  # ---- Sub-file span fixtures (pinned / forked markdown spans) ----------
  # Spans require a disposition (the span engine rides the stored-base
  # 3-way merge path). Each span scenario gets its own dst (and thus
  # file_id) so its per-host byte-base AND spans sidecar never cross.
  # All share src spans/note.md — editing it (per fresh container)
  # simulates an upstream change ELSEWHERE in the file.
  spans_pinned_md:
    src: spans/note.md
    dst: ~/.setforge_e2e/spans/pinned.md
    disposition: shared
    spans:
      - anchor: "## Pinned Section"
        kind: pinned
        semantics: shared
  spans_forked_md:
    src: spans/note.md
    dst: ~/.setforge_e2e/spans/forked.md
    disposition: shared
    spans:
      - anchor: "## Forked Section"
        kind: forked
        semantics: shared
  # A SHARED markdown tracked_file the host-local OVERLAY span attaches to.
  # The overlay span itself (markerless host-local body) is declared in
  # local.yaml at test time; the body must NEVER bake into the tracked src
  # nor the stored base (the canonical leak gate).
  spans_overlay_md:
    src: spans/note.md
    dst: ~/.setforge_e2e/spans/overlay.md
    disposition: shared
  # Multi-section markdown (no disposition → markerless OVERLAY path) used to
  # prove an in-section overlay body re-deploys at its TYPED position, not just
  # under the enclosing heading (the anchor-positioning regression).
  section_position_md:
    src: section-position/multi.md
    dst: ~/.setforge_e2e/section-position/multi.md
  # ---- Structural (yaml dotted-path) span fixtures -----------------------
  # A yaml tracked_file whose span anchors are DOTTED PATHS (mapping leaves),
  # not headings. The pinned path is re-asserted to live post-merge; the
  # forked path merges upstream; both are excluded from capture. Editing the
  # shared src per fresh container simulates an upstream change at the path.
  spans_structural_yaml:
    src: spans/structural.yaml
    dst: ~/.setforge_e2e/spans/structural.yaml
    disposition: shared
    spans:
      - anchor: editor.fontSize
        kind: pinned
        semantics: shared
      - anchor: telemetry.level
        kind: forked
        semantics: shared
  spans_structural_subtree_yaml:
    src: spans/structural_subtree.yaml
    dst: ~/.setforge_e2e/spans/structural_subtree.yaml
    disposition: shared
    spans:
      - anchor: pinned
        kind: pinned
        semantics: shared

# ----------------------------------------------------------------------
# Marketplaces — referenced only by test-comprehensive. Test-comprehensive
# uses a well-known stable plugin (superpowers from claude-plugins-official)
# rather than hosting a fixture-plugin repo: avoids one more moving piece
# and matches what real users install. See open question 4 resolution.
# ----------------------------------------------------------------------
marketplaces:
  claude-plugins-official:
    source: github
    repo: anthropics/claude-plugins-official

# ----------------------------------------------------------------------
# Claude plugins — referenced only by test-comprehensive.
# ----------------------------------------------------------------------
claude_plugins:
  superpowers:
    marketplace: claude-plugins-official

# ----------------------------------------------------------------------
# Section-template library — seed-once host-local section bodies.
# ----------------------------------------------------------------------
section_templates:
  python-conventions:
    src: python-conventions.md

# ----------------------------------------------------------------------
# Profiles. Test-only — never duplicate production profile names.
# ----------------------------------------------------------------------
profiles:
  # ---- Single-mechanism profiles (10) ----------------------------------
  test-minimal:
    tracked_files:
      - minimal_text

  test-text-sections:
    tracked_files:
      - sections_md

  test-reconcile-sections:
    tracked_files:
      - sections_shared_md

  test-json:
    tracked_files:
      - json_settings

  test-jsonc-shallow:
    tracked_files:
      - jsonc_shallow

  test-jsonc-deep:
    tracked_files:
      - jsonc_deep

  test-yaml-shallow:
    tracked_files:
      - yaml_shallow

  test-yaml-deep:
    tracked_files:
      - yaml_deep

  test-directory:
    tracked_files:
      - directory_tree

  test-template:
    tracked_files:
      - template_path

  # ---- Chain profiles (3 entries: grandparent + base + child) ----------
  # The chain ancestors are profile entries in their own right — they're
  # referenced as `extends:` targets, never directly. Counted toward the
  # 11+2 = 13 total per spec line 44.
  test-chain-grandparent:
    tracked_files:
      - chain_grand
    bootstrap:
      - ~/.setforge_e2e/chain/bootstrap-grand.txt

  test-chain-base:
    extends: test-chain-grandparent
    tracked_files:
      - chain_base
    bootstrap:
      - ~/.setforge_e2e/chain/bootstrap-base.txt

  test-chain-child:
    extends: test-chain-base
    tracked_files:
      - chain_child
    bootstrap:
      - ~/.setforge_e2e/chain/bootstrap-child.txt

  # ---- Comprehensive — tracked files + plugins + extensions + bootstrap ----
  test-comprehensive:
    tracked_files:
      - comprehensive_text
      - comprehensive_json
      - comprehensive_jsonc
      - comprehensive_yaml
    claude_plugins:
      - superpowers
    extensions:
      include:
        - editorconfig.editorconfig
    bootstrap:
      - ~/.setforge_e2e/comprehensive/bootstrap-stub.txt

  # ---- Prose-reviewer artifacts --------------------------------------
  # Exercises install / compare / revert for the three new prose
  # reviewer agents + the new reviewing-markdown skill, in isolation
  # from plugin / extension reconciliation.
  test-prose-reviewers:
    tracked_files:
      - prose_python_agent
      - prose_claude_md_agent
      - prose_markdown_agent
      - prose_reviewing_markdown_skill

  # ---- Workflows category (session-workflow) ---------------------------
  # Exercises install / compare / revert for a ~/.claude/workflows/*.js
  # file — a net-new tracked deploy category.
  test-workflows:
    tracked_files:
      - workflows_example_impl

  # ---- Host-local sections ---------------------------------------------
  test-host-local:
    tracked_files:
      - host_local_md
  test-host-local-symlink:
    tracked_files:
      - host_local_md_symlink
  test-host-local-reject-json:
    tracked_files:
      - host_local_json_reject

  # ---- Seed-once section templates -------------------------------------
  test-section-templates:
    tracked_files:
      - section_seed_doc
    section_slots:
      python-conventions: python-conventions

  # ---- Disposition (shared / forked / pinned) --------------------------
  # One profile per disposition so each test installs/syncs/compares a
  # single file in isolation and the stored-base lifecycle never crosses
  # policies. The forked-yaml profile drives the structural-engine and
  # compare-expected-drift surfaces.
  test-disposition-shared:
    tracked_files:
      - disposition_shared_md
  test-disposition-forked:
    tracked_files:
      - disposition_forked_md
  test-disposition-pinned:
    tracked_files:
      - disposition_pinned_md
  test-disposition-forked-yaml:
    tracked_files:
      - disposition_forked_yaml

  # ---- Dual representation ----------------------------------------------
  # One profile carrying BOTH 2.0 reconciliation models: a host-local
  # OVERLAY-injection file (host_local_md, driven by local.yaml
  # host_local_sections) AND a disposition: shared file. Exercises that the
  # two coexist in a single install run without interference (distinct dst
  # => distinct file_id => per-host base never crosses; the run-global
  # keep-set prune retains the disposition base).
  test-dual-representation:
    tracked_files:
      - host_local_md
      - disposition_shared_md

  # ---- Sub-file spans (pinned / forked markdown spans) ------------------
  # One profile per span scenario so each test installs / syncs / compares /
  # reverts a single span-bearing file in isolation and the per-host base +
  # spans sidecar lifecycle never crosses scenarios.
  test-spans-pinned:
    tracked_files:
      - spans_pinned_md
  test-spans-forked:
    tracked_files:
      - spans_forked_md
  test-spans-structural:
    tracked_files:
      - spans_structural_yaml
      - spans_structural_subtree_yaml
  test-spans-overlay:
    tracked_files:
      - spans_overlay_md

  # ---- In-section anchor positioning -----------------------------------
  # Multi-section markdown for the position-asserting overlay round-trip:
  # a host note typed in the MIDDLE of a section must re-deploy in the
  # middle, not relocate to just under the heading.
  test-section-position:
    tracked_files:
      - section_position_md

  # ---- override CLI journey ---------------------------------------------
  # A markdown + a yaml shared tracked_file, each with no declared spans, so
  # the override pin/show/install/compare round-trip starts from a clean slate.
  test-override:
    tracked_files:
      - override_md
      - override_yaml
