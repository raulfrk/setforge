# Test-only setforge config for E2E coverage (setforge-nen.9).
#
# This config is tool-generic — it never references production profiles
# (vm-headless / -full / workstation), which will be extracted to a
# separate config repo via setforge-2ba. Every profile here exercises
# one well-defined mechanism so the matching variant in
# tests/test_e2e_docker.py and tests/test_cli_e2e.py can assert against
# a stable shape.
#
# Layout (tracked srcs):
#   tests/fixtures/e2e/tracked/<area>/<file>
# Live dst paths are intentionally placed under $HOME so docker
# variants and tmp-path CliRunner variants both work cleanly.
version: 1

# ----------------------------------------------------------------------
# Tracked files. Each entry pairs a tracked src with a live dst plus optional
# preserve / template / section directives. Keys are stable identifiers
# referenced by profile.tracked_files lists below.
# ----------------------------------------------------------------------
tracked_files:
  # Plain text — floor case, no overlays, byte copy.
  minimal_text:
    src: minimal/text.txt
    dst: ~/.my_setup_e2e/minimal/text.txt

  # Text tracked file with HTML-comment user-section markers (sections.py).
  sections_md:
    src: sections/marked.md
    dst: ~/.my_setup_e2e/sections/marked.md
    preserve_user_sections: true

  # Shared-semantics user-section markers — exercises the three-way
  # reconcile wizard introduced in setforge-9by.
  sections_shared_md:
    src: sections/shared.md
    dst: ~/.my_setup_e2e/sections/shared.md
    preserve_user_sections: true

  # JSON tracked file — byte copy, no preserve mechanism.
  json_settings:
    src: json/settings.json
    dst: ~/.my_setup_e2e/json/settings.json

  # JSONC with shallow preserve_user_keys (dotted-name leaves).
  # NOTE: extension is `.json` because my_setup/jsonc.py:is_jsonc_file
  # treats every `.json` as JSONC-capable (matches VSCode semantics).
  jsonc_shallow:
    src: jsonc/shallow.json
    dst: ~/.my_setup_e2e/jsonc/shallow.json
    preserve_user_keys:
      - userKeyA
      - userKeyB

  # JSONC with deep preserve_user_keys_deep — drives JSONC wizard variants.
  jsonc_deep:
    src: jsonc/deep.json
    dst: ~/.my_setup_e2e/jsonc/deep.json
    preserve_user_keys_deep:
      - settings

  # YAML shallow — proves yaml_merge.py shallow parity with jsonc.py.
  yaml_shallow:
    src: yaml/shallow.yaml
    dst: ~/.my_setup_e2e/yaml/shallow.yaml
    preserve_user_keys:
      - userKeyA
      - userKeyB

  # YAML deep — proves yaml_merge.py deep parity; drives YAML wizard variant.
  yaml_deep:
    src: yaml/deep.yaml
    dst: ~/.my_setup_e2e/yaml/deep.yaml
    preserve_user_keys_deep:
      - settings

  # Directory tree — recursive copy.
  directory_tree:
    src: directory
    dst: ~/.my_setup_e2e/directory

  # Template — Jinja2 dst rendered (template: true triggers render).
  template_path:
    src: template/template.txt
    dst: "{{ vscode_user_dir }}/setforge-e2e-template.txt"
    template: true

  # Three-level chain tracked files (one per chain layer for distinguishable
  # parent-first-dedup ordering in test_install_chain_resolution).
  chain_grand:
    src: chain/grand.txt
    dst: ~/.my_setup_e2e/chain/grand.txt
  chain_base:
    src: chain/base.txt
    dst: ~/.my_setup_e2e/chain/base.txt
  chain_child:
    src: chain/child.txt
    dst: ~/.my_setup_e2e/chain/child.txt

  # Comprehensive: plain + JSON + JSONC + YAML in one profile.
  comprehensive_text:
    src: comprehensive/notes.md
    dst: ~/.my_setup_e2e/comprehensive/notes.md
  comprehensive_json:
    src: comprehensive/data.json
    dst: ~/.my_setup_e2e/comprehensive/data.json
  comprehensive_jsonc:
    src: comprehensive/preserve-settings.json
    dst: ~/.my_setup_e2e/comprehensive/preserve-settings.json
    preserve_user_keys:
      - userKey
  comprehensive_yaml:
    src: comprehensive/config.yaml
    dst: ~/.my_setup_e2e/comprehensive/config.yaml

  # Prose-reviewer agents + reviewing-markdown skill (setforge-h5k).
  # Test-only mirror of the production wiring in /workspace/my_setup.yaml;
  # used by the prose-reviewer Docker e2e variants to exercise install /
  # compare / revert against new files that have no user-section markers
  # (implicitly covers 9by's strict-tag parser).
  prose_python_agent:
    src: claude/agents/python-prose-reviewer.md
    dst: ~/.claude/agents/python-prose-reviewer.md
  prose_claude_md_agent:
    src: claude/agents/claude-md-prose-reviewer.md
    dst: ~/.claude/agents/claude-md-prose-reviewer.md
  prose_markdown_agent:
    src: claude/agents/markdown-prose-reviewer.md
    dst: ~/.claude/agents/markdown-prose-reviewer.md
  prose_reviewing_markdown_skill:
    src: claude/skills/reviewing-markdown/SKILL.md
    dst: ~/.claude/skills/reviewing-markdown/SKILL.md

# ----------------------------------------------------------------------
# Marketplaces — referenced only by test-comprehensive. Test-comprehensive
# uses a well-known stable plugin (superpowers from claude-plugins-official)
# rather than hosting a fixture-plugin repo: avoids one more moving piece
# and matches what real users install. See open question 4 resolution.
# ----------------------------------------------------------------------
marketplaces:
  claude-plugins-official:
    source: github
    repo: anthropics/claude-plugins-official

# ----------------------------------------------------------------------
# Claude plugins — referenced only by test-comprehensive.
# ----------------------------------------------------------------------
claude_plugins:
  superpowers:
    marketplace: claude-plugins-official

# ----------------------------------------------------------------------
# Profiles. Test-only — never duplicate production profile names.
# ----------------------------------------------------------------------
profiles:
  # ---- Single-mechanism profiles (10) ----------------------------------
  test-minimal:
    tracked_files:
      - minimal_text

  test-text-sections:
    tracked_files:
      - sections_md

  test-reconcile-sections:
    tracked_files:
      - sections_shared_md

  test-json:
    tracked_files:
      - json_settings

  test-jsonc-shallow:
    tracked_files:
      - jsonc_shallow

  test-jsonc-deep:
    tracked_files:
      - jsonc_deep

  test-yaml-shallow:
    tracked_files:
      - yaml_shallow

  test-yaml-deep:
    tracked_files:
      - yaml_deep

  test-directory:
    tracked_files:
      - directory_tree

  test-template:
    tracked_files:
      - template_path

  # ---- Chain profiles (3 entries: grandparent + base + child) ----------
  # The chain ancestors are profile entries in their own right — they're
  # referenced as `extends:` targets, never directly. Counted toward the
  # 11+2 = 13 total per spec line 44.
  test-chain-grandparent:
    tracked_files:
      - chain_grand
    bootstrap:
      - ~/.my_setup_e2e/chain/bootstrap-grand.txt

  test-chain-base:
    extends: test-chain-grandparent
    tracked_files:
      - chain_base
    bootstrap:
      - ~/.my_setup_e2e/chain/bootstrap-base.txt

  test-chain-child:
    extends: test-chain-base
    tracked_files:
      - chain_child
    bootstrap:
      - ~/.my_setup_e2e/chain/bootstrap-child.txt

  # ---- Comprehensive — tracked files + plugins + extensions + bootstrap ----
  test-comprehensive:
    tracked_files:
      - comprehensive_text
      - comprehensive_json
      - comprehensive_jsonc
      - comprehensive_yaml
    claude_plugins:
      - superpowers
    extensions:
      include:
        - editorconfig.editorconfig
    bootstrap:
      - ~/.my_setup_e2e/comprehensive/bootstrap-stub.txt

  # ---- Prose-reviewer artifacts (setforge-h5k) ------------------------
  # Exercises install / compare / revert for the three new prose
  # reviewer agents + the new reviewing-markdown skill, in isolation
  # from plugin / extension reconciliation.
  test-prose-reviewers:
    tracked_files:
      - prose_python_agent
      - prose_claude_md_agent
      - prose_markdown_agent
      - prose_reviewing_markdown_skill
