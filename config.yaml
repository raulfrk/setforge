config:
  backup: true
  create: true
  dotpath: tracked
  ignoreempty: true
  link_dotfile_default: nolink

dynvariables:
  vscode_user_dir: |
    if [ "$(uname -s)" = "Darwin" ]; then
      echo "$HOME/Library/Application Support/Code/User"
    else
      echo "$HOME/.config/Code/User"
    fi

dotfiles:
  f_claude_md:
    src: claude/CLAUDE.md
    dst: ~/.claude/CLAUDE.md
  f_claude_settings:
    src: claude/settings.json
    dst: ~/.claude/settings.json
  f_vscode_serv_settings:
    src: vscode/vm/settings.json
    dst: ~/.vscode-server/data/Machine/settings.json
  f_vscode_workstation_settings:
    src: vscode/workstation/settings.json
    dst: "{{@@ vscode_user_dir @@}}/settings.json"

profiles:
  shared-base:
    dotfiles:
      - f_claude_md
      - f_claude_settings

  vm-headless:
    include:
      - shared-base
    dotfiles:
      - f_vscode_serv_settings
  vm-headless-vscode:
    dotfiles:
      - f_vscode_serv_settings
  workstation:
    include:
      - shared-base
    dotfiles:
      - f_vscode_workstation_settings
