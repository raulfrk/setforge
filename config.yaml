config:
  backup: true
  create: true
  dotpath: tracked
  ignoreempty: true
  link_dotfile_default: nolink

dynvariables:
  vscode_user_dir: |
    if [ "$(uname -s)" = "Darwin" ]; then
      echo "$HOME/Library/Application Support/Code/User"
    else
      echo "$HOME/.config/Code/User"
    fi

actions:
  post:
    register_private_journal_mcp: |
      if command -v claude >/dev/null 2>&1; then
        expected="$HOME/.claude/journal"
        current=$(jq -r '.mcpServers["private-journal"].env.PRIVATE_JOURNAL_PATH // ""' "$HOME/.claude.json" 2>/dev/null)
        if [ "$current" != "$expected" ]; then
          claude mcp remove -s user private-journal >/dev/null 2>&1 || true
          claude mcp add -s user --env=PRIVATE_JOURNAL_PATH="$expected" private-journal -- npx github:obra/private-journal-mcp >/dev/null
          echo "[dotdrop] private-journal MCP registered (PRIVATE_JOURNAL_PATH=$expected)"
        fi
      else
        echo "[dotdrop] claude CLI not on PATH; skipping private-journal MCP registration"
      fi

dotfiles:
  f_claude_md:
    src: claude/CLAUDE.md
    dst: ~/.claude/CLAUDE.md
  f_claude_additional_md:
    src: claude/additional-content.md
    dst: ~/.claude/additional-content.md
  f_claude_header_md:
    src: claude/header.md
    dst: ~/.claude/header.md
  f_claude_settings:
    src: claude/settings.json
    dst: ~/.claude/settings.json
  f_claude_output_styles:
    src: claude/output-styles
    dst: ~/.claude/output-styles
  f_claude_superpowers_prefs:
    src: claude/superpowers-prefs.md
    dst: ~/.claude/superpowers-prefs.md
  f_claude_private_journal_prefs:
    src: claude/private-journal-prefs.md
    dst: ~/.claude/private-journal-prefs.md
    actions:
      - register_private_journal_mcp
  f_vscode_serv_settings:
    src: vscode/vm/settings.json
    dst: ~/.vscode-server/data/Machine/settings.json
  f_vscode_workstation_settings:
    src: vscode/workstation/settings.json
    dst: "{{@@ vscode_user_dir @@}}/settings.json"

profiles:
  shared-base:
    dotfiles:
      - f_claude_md
      - f_claude_settings
      - f_claude_output_styles
      - f_claude_superpowers_prefs
      - f_claude_private_journal_prefs

  vm-headless:
    include:
      - shared-base
    dotfiles:
      - f_vscode_serv_settings
  vm-headless-full:
    include:
      - shared-base
    dotfiles:
      - f_vscode_serv_settings
      - f_claude_additional_md
      - f_claude_header_md
  vm-headless-vscode:
    dotfiles:
      - f_vscode_serv_settings
  workstation:
    include:
      - shared-base
    dotfiles:
      - f_vscode_workstation_settings
