[project]
name = "setforge"
version = "0.1.0"
description = "Tracked-file + VSCode + Claude plugin orchestration CLI"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12",
    "pydantic>=2.6",
    "ruamel.yaml>=0.18",
    "platformdirs>=4.0",
    "jinja2>=3.1",
    "json-five>=1.1,<2",
    "rich>=13",
]

[project.optional-dependencies]
dev = [
    "pexpect>=4.9",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-xdist>=3.6",
    "ruff>=0.7",
]

[project.scripts]
setforge = "setforge.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["setforge"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF", "PT", "ANN"]
# ANN202 is a permanent ignore: project annotates public surface only (per CLAUDE.md).
# The remaining suppressions are deferred to follow-up beads — clear each entry as the
# corresponding bead closes:
#   ANN001 → dotfiles-seu (85 sites: missing function-arg annotations)
#   ANN401 → dotfiles-m6g (29 sites: Any usages)
ignore = [
    "ANN001",
    "ANN202",
    "ANN401",
]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"subprocess.run".msg = "Use `import subprocess` and call `subprocess.run(...)` — required for test monkeypatch path `setforge.<module>.subprocess.run` to resolve correctly."

[tool.pytest.ini_options]
markers = [
    "e2e_docker: end-to-end Docker tests against a real Debian + claude + code container (opt-in via -m e2e_docker; not run by default)",
]
# Default run skips e2e_docker so plain `pytest` stays fast and docker-free.
addopts = "-m 'not e2e_docker'"
