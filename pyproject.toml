[project]
name = "my-setup"
version = "0.1.0"
description = "Dotfile + VSCode + Claude plugin orchestration CLI"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12",
    "pydantic>=2.6",
    "ruamel.yaml>=0.18",
    "platformdirs>=4.0",
    "jinja2>=3.1",
    "json-five>=1.1,<2",
    "rich>=13",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.7",
]

[project.scripts]
my-setup = "my_setup.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["my_setup"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF", "PT", "ANN"]
# ANN202 is a permanent ignore: project annotates public surface only (per CLAUDE.md).
# The remaining suppressions are deferred to follow-up beads — clear each entry as the
# corresponding bead closes:
#   ANN001 → dotfiles-seu (85 sites: missing function-arg annotations)
#   ANN401 → dotfiles-m6g (29 sites: Any usages)
#   E501   → dotfiles-2du (26 sites: long lines)
#   ANN003 → dotfiles-jbv (21 sites: **kwargs annotations)
#   B904   → dotfiles-qlt (5 sites: chained-raise without `from`)
#   ANN002, ANN201, B008, E402, PT011, RUF002 → dotfiles-0yh (8 misc singletons)
ignore = [
    "ANN001",
    "ANN002",
    "ANN003",
    "ANN201",
    "ANN202",
    "ANN401",
    "B008",
    "B904",
    "E402",
    "E501",
    "PT011",
    "RUF002",
]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"subprocess.run".msg = "Use `import subprocess` and call `subprocess.run(...)` — required for test monkeypatch path `my_setup.<module>.subprocess.run` to resolve correctly."
