name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: my-setup unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run my-setup validate --all
      - run: uv run my-setup validate --config=tests/fixtures/e2e/my_setup.test.yaml --all
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pytest

  e2e-docker:
    name: E2E Docker tests (dotfiles-nen.9)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build E2E image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: tests/docker/Dockerfile
          tags: my-setup-e2e:test
          load: true
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,scope=e2e,mode=max
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: Run E2E variants
        run: uv run pytest -m e2e_docker -v

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
