name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: setforge unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      # The engine repo no longer carries setforge.yaml at root after the
      # split; CI validates against the e2e test fixture only.
      - run: uv run setforge validate --config=tests/fixtures/e2e/setforge.test.yaml --all
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy setforge/ tests/ scripts/
      # Non-bypassable schema gates (migration-coverage / field-removal /
      # reverse-required). Its own step, no continue-on-error: a violation
      # is a hard CI failure. Standalone — NOT a pytest test, because
      # pytest is skippable via markers / addopts.
      - run: uv run python scripts/check_schema_gates.py
      - run: uv run pytest

  build-verify:
    name: Build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build sdist + wheel
        run: uv build
      - name: Twine-check the built artifacts
        run: uv tool run --from twine twine check --strict dist/*

  e2e-docker:
    name: E2E Docker tests
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      # Compute the same content-hashed tag the fixture expects, so the
      # prebuild image matches what `docker image inspect` looks for
      # inside `docker_image` (see `_image_tag` in tests/docker/conftest.py).
      # Without this, the prebuild would tag the image
      # with a name the fixture never asks for, and the fixture would
      # rebuild from scratch, defeating the GHA layer cache.
      - name: Compute E2E image tag
        id: tag
        run: |
          uv run python -c 'from tests.docker.conftest import _image_tag; print(f"image_tag={_image_tag()}")' >> "$GITHUB_OUTPUT"
      - name: Build E2E image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: tests/docker/Dockerfile
          tags: ${{ steps.tag.outputs.image_tag }}
          load: true
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,scope=e2e,mode=max
      - name: Run E2E variants
        # --no-cov is mandatory: the project conftest auto-activates xdist
        # (-n 2) for `-m e2e_docker`, and pytest-cov's Central controller
        # crashes at xdist worker setup (AttributeError: 'Central' object
        # has no attribute 'configure_node') when --cov is in default
        # addopts. Coverage is meaningless for e2e tests anyway.
        run: uv run pytest -m e2e_docker -v --no-cov

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
