name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate dotdrop config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          set -euo pipefail
          profiles=$(uvx dotdrop --cfg config.yaml profiles -Gb | tail -n +2)
          for profile in $profiles; do
            echo "=== Profile: $profile ==="
            output=$(uvx dotdrop --cfg config.yaml files -p $profile)
            echo "$output"
            if echo "$output" | grep -F '{{@@'; then
              echo "::error::Unrendered template marker in profile $profile" >&2
              exit 1
            fi
          done

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
